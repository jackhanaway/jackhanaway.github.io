title: Jack Hanaway
subtitle: "Baseball Analytics Portfolio"
email: jhanaway42@gmail.com
description: >-
  Baseball analytics portfolio featuring data engineering, R Shiny applications,
  Python research, and player development tools built across professional and
  collegiate baseball environments.

baseurl: ""
url: "https://jackhanaway.github.io"  # ← replace with your actual GitHub username

twitter_username: "jacksonhanaway"
github_username: jackhanaway  # ← replace with your actual GitHub username

minimal_mistakes_skin: "air"   # clean, professional blue-tinted white skin

search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/Chicago

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ── Author / Sidebar ──────────────────────────────────────────────────────────
author:
  name   : "Jack Hanaway"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Baseball analytics professional with experience in R, Python, and Trackman
            across collegiate and professional environments. B.S. Sport Management,
            University of Tennessee. Incoming M.S. Business Analytics."
  location: "Knoxville, TN"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jack-hanaway-b279662a0/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jackhanaway"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jhanaway42@gmail.com"

# ── Footer ────────────────────────────────────────────────────────────────────
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://https://www.linkedin.com/in/jack-hanaway-b279662a0/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jackhanaway"

# ── Navigation ────────────────────────────────────────────────────────────────
# Create a file at _data/navigation.yml with the content below this config.
# (Shown as a comment here for reference — see separate navigation.yml file)

# ── Defaults ─────────────────────────────────────────────────────────────────
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  # _projects
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true

# ── Collections ───────────────────────────────────────────────────────────────
collections:
  projects:
    output: true
    permalink: /projects/:path/

# ── Archives ─────────────────────────────────────────────────────────────────
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
